<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRX Trading Dashboard</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F5F7; --surface: #FFFFFF; --primary: #1D1D1F;
  --secondary: #6E6E73; --tertiary: #AEAEB2; --accent: #0071E3;
  --positive: #34C759; --negative: #FF3B30; --warning: #FF9F0A;
  --shadow: 0 2px 16px rgba(0,0,0,0.07);
  --shadow-hero: 0 4px 24px rgba(0,0,0,0.09);
  --radius: 18px; --radius-sm: 10px;
}

body {
  font-family: "Pretendard Variable","Pretendard",-apple-system,BlinkMacSystemFont,sans-serif;
  background: var(--bg); color: var(--primary); min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

nav {
  background: rgba(255,255,255,0.85);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid rgba(0,0,0,0.06);
  position: sticky; top: 0; z-index: 100;
  padding: 0 32px; height: 52px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-logo { font-size: 17px; font-weight: 700; letter-spacing: -0.4px; }
.nav-logo span { color: var(--accent); }
.nav-meta { font-size: 12px; color: var(--secondary); display: flex; align-items: center; gap: 6px; }
.nav-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--positive); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.page { max-width: 1160px; margin: 0 auto; padding: 32px 24px 64px; }

.hero { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 16px; }
.hero-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 28px 32px 24px; box-shadow: var(--shadow-hero);
  position: relative; overflow: hidden;
}
.hero-card::before {
  content:''; position:absolute; top:0; left:0; right:0;
  height:3px; border-radius: var(--radius) var(--radius) 0 0;
}
.hero-card.c-pos::before { background: var(--positive); }
.hero-card.c-acc::before { background: var(--accent); }
.hero-card.c-neu::before { background: var(--tertiary); }

.hero-label { font-size:12px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:var(--secondary); margin-bottom:12px; }
.hero-value { font-size:52px; font-weight:700; letter-spacing:-2px; line-height:1; margin-bottom:10px; }
.hero-value.pos { color: var(--positive); }
.hero-value.neg { color: var(--negative); }
.hero-value.acc { color: var(--accent); }
.hero-value.pri { color: var(--primary); }
.hero-sub { font-size:13px; color:var(--secondary); display:flex; align-items:center; gap:6px; }

.badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px; font-size:12px; font-weight:600; }
.badge.up  { background:rgba(52,199,89,0.12);  color:var(--positive); }
.badge.dn  { background:rgba(255,59,48,0.12);  color:var(--negative); }
.badge.neu { background:rgba(110,110,115,0.1); color:var(--secondary); }

.quick-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px; }
.stat-card { background:var(--surface); border-radius:var(--radius-sm); padding:18px 20px; box-shadow:var(--shadow); }
.stat-label { font-size:11px; font-weight:500; letter-spacing:0.05em; text-transform:uppercase; color:var(--tertiary); margin-bottom:6px; }
.stat-value { font-size:20px; font-weight:600; letter-spacing:-0.5px; }
.stat-value.pos { color:var(--positive); }
.stat-value.neg { color:var(--negative); }
.stat-sub { font-size:11px; color:var(--tertiary); margin-top:4px; }

.main-grid { display:grid; grid-template-columns:1fr 380px; gap:16px; margin-bottom:16px; }

.card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
.card-header { padding:20px 24px 0; display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px; }
.card-title { font-size:15px; font-weight:600; letter-spacing:-0.2px; }
.card-body { padding:0 24px 24px; }

table { width:100%; border-collapse:collapse; font-size:13px; }
thead th { font-size:11px; font-weight:500; letter-spacing:0.04em; text-transform:uppercase; color:var(--tertiary); padding:0 8px 10px; text-align:right; }
thead th:first-child { text-align:left; padding-left:0; }
tbody tr { border-top:1px solid rgba(0,0,0,0.04); transition:background 0.15s; }
tbody tr:hover { background:rgba(0,0,0,0.015); }
td { padding:11px 8px; text-align:right; }
td:first-child { text-align:left; padding-left:0; }
.ticker { font-weight:600; font-size:13px; letter-spacing:-0.2px; }
.ticker-sub { font-size:11px; color:var(--secondary); margin-top:1px; }
.pnl-pos { color:var(--positive); font-weight:600; }
.pnl-neg { color:var(--negative); font-weight:600; }
.tag { display:inline-block; padding:2px 7px; border-radius:5px; font-size:10px; font-weight:600; background:rgba(0,113,227,0.1); color:var(--accent); }

.chart-wrap { position:relative; height:220px; }

.market-rows { padding:0 24px 20px; display:flex; flex-direction:column; gap:12px; }
.mrow { display:flex; justify-content:space-between; align-items:center; }
.mrow + .mrow { border-top:1px solid rgba(0,0,0,0.05); padding-top:12px; }
.mk { font-size:12px; color:var(--secondary); font-weight:500; }
.mv { font-size:13px; font-weight:600; }
.mv.good { color:var(--positive); }
.mv.warn { color:var(--warning); }
.mv.bad  { color:var(--negative); }

.bar-wrap { height:4px; background:rgba(0,0,0,0.06); border-radius:2px; margin-top:5px; }
.bar-fill { height:4px; border-radius:2px; }

footer { text-align:center; font-size:12px; color:var(--tertiary); padding:0 0 32px; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">KRX <span>Dashboard</span></div>
  <div class="nav-meta">
    <div class="nav-dot"></div>
    <span id="nav-updated">로딩 중...</span>
  </div>
</nav>

<div class="page">
  <div class="hero">
    <div class="hero-card c-pos">
      <div class="hero-label">누적 수익률</div>
      <div class="hero-value pos" id="h-roi">--</div>
      <div class="hero-sub">
        <span class="badge neu" id="h-today-badge">오늘 --</span>
        <span>실현 기준</span>
      </div>
    </div>
    <div class="hero-card c-acc">
      <div class="hero-label">승률</div>
      <div class="hero-value acc" id="h-winrate">--</div>
      <div class="hero-sub">
        <span class="badge neu" id="h-wins-badge">-- 승 / -- 패</span>
        <span id="h-total-trades">최근 --거래</span>
      </div>
    </div>
    <div class="hero-card c-neu">
      <div class="hero-label">활성 포지션</div>
      <div class="hero-value pri" id="h-positions">--</div>
      <div class="hero-sub">
        <span class="badge neu" id="h-unrealized-badge">미실현 --</span>
        <span id="h-slot-rate">슬롯 --%</span>
      </div>
    </div>
  </div>

  <div class="quick-stats">
    <div class="stat-card">
      <div class="stat-label">투자 원금</div>
      <div class="stat-value" id="q-capital">--</div>
      <div class="stat-sub" id="q-capital-sub">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">실현 손익</div>
      <div class="stat-value" id="q-realized">--</div>
      <div class="stat-sub" id="q-monthly">이번 달 --</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">미실현 손익</div>
      <div class="stat-value" id="q-unrealized">--</div>
      <div class="stat-sub" id="q-unrealized-sub">--종목 합산</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">오늘 거래</div>
      <div class="stat-value" id="q-today-count">--</div>
      <div class="stat-sub" id="q-today-pnl">순손익 --</div>
    </div>
  </div>

  <div class="main-grid">
    <div class="card">
      <div class="card-header"><div class="card-title">보유 포지션</div></div>
      <div class="card-body">
        <table>
          <thead>
            <tr><th>종목</th><th>진입가</th><th>수량</th><th>손익</th><th>전략</th></tr>
          </thead>
          <tbody id="positions-tbody">
            <tr><td colspan="5" style="text-align:center;color:var(--tertiary);padding:24px 0">로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:16px;">
      <div class="card">
        <div class="card-header"><div class="card-title">수익률 추이</div></div>
        <div class="card-body" style="padding-top:0">
          <div class="chart-wrap"><canvas id="pnlChart"></canvas></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header" style="margin-bottom:8px">
          <div class="card-title">시장 환경</div>
          <span class="badge neu" id="regime-badge">--</span>
        </div>
        <div class="market-rows">
          <div class="mrow"><span class="mk">레짐</span><span class="mv" id="m-regime">--</span></div>
          <div class="mrow"><span class="mk">공포탐욕 지수</span><span class="mv" id="m-fg">--</span></div>
          <div class="mrow"><span class="mk">외국인 순매수</span><span class="mv" id="m-frgn">--</span></div>
          <div class="mrow"><span class="mk">VIX</span><span class="mv" id="m-vix">--</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><div class="card-title">종목별 누적 성과</div></div>
    <div class="card-body">
      <table>
        <thead>
          <tr>
            <th style="width:24px"></th>
            <th style="text-align:left">종목</th>
            <th>총 거래</th><th>승률</th><th>평균 수익</th><th>누적 손익</th>
          </tr>
        </thead>
        <tbody id="stats-tbody">
          <tr><td colspan="6" style="text-align:center;color:var(--tertiary);padding:24px 0">로딩 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<footer>KRX Trading Bot Dashboard</footer>

<script>
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtMoney(n) {
  if (n === undefined || n === null) return '--';
  const abs = Math.abs(n), sign = n >= 0 ? '+' : '-';
  if (abs >= 100000000) return sign + (abs/100000000).toFixed(1) + '억';
  if (abs >= 10000)     return sign + Math.round(abs/10000) + '만';
  return (n >= 0 ? '+' : '') + n.toLocaleString();
}
function fmtPct(n, dec) {
  if (n === undefined || n === null) return '--';
  return (n >= 0 ? '+' : '') + n.toFixed(dec ?? 1) + '%';
}
function fmtNum(n) {
  if (n === undefined || n === null) return '--';
  return Number(n).toLocaleString();
}
function pnlCls(n) { return n > 0 ? 'pnl-pos' : n < 0 ? 'pnl-neg' : ''; }

let chart = null;
function initChart(equity) {
  const ctx = document.getElementById('pnlChart').getContext('2d');
  const valid = equity.filter(p => p?.date && p?.value != null);
  if (valid.length < 2) return;
  const base   = valid[0].value;
  const labels = valid.map(p => p.date.slice(5));
  const data   = valid.map(p => +((p.value - base) / base * 100).toFixed(2));
  const color  = (data[data.length-1] ?? 0) >= 0 ? '#34C759' : '#FF3B30';
  const rgb    = color === '#34C759' ? '52,199,89' : '255,59,48';
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data, borderColor: color, borderWidth: 2,
        pointRadius: 0, pointHoverRadius: 4, pointHoverBackgroundColor: color,
        fill: true, tension: 0.4,
        backgroundColor: (c) => {
          const g = c.chart.ctx.createLinearGradient(0,0,0,200);
          g.addColorStop(0, `rgba(${rgb},0.15)`);
          g.addColorStop(1, `rgba(${rgb},0)`);
          return g;
        },
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(255,255,255,0.95)',
          titleColor: '#1D1D1F', bodyColor: color,
          borderColor: 'rgba(0,0,0,0.08)', borderWidth: 1, padding: 10,
          callbacks: { label: c => '  ' + fmtPct(c.parsed.y, 2) }
        }
      },
      scales: {
        x: { grid:{display:false}, border:{display:false}, ticks:{color:'#AEAEB2',font:{size:10},maxTicksLimit:6} },
        y: { grid:{color:'rgba(0,0,0,0.04)'}, border:{display:false}, ticks:{color:'#AEAEB2',font:{size:10},callback:v=>v+'%'} }
      }
    }
  });
}

function render(d) {
  const p = d.portfolio ?? {};
  const t = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('nav-updated').textContent = '마지막 업데이트 ' + t;

  const roi = p.roi_pct ?? 0;
  const hRoi = document.getElementById('h-roi');
  hRoi.textContent = fmtPct(roi);
  hRoi.className = 'hero-value ' + (roi >= 0 ? 'pos' : 'neg');

  const todayPct = p.today_return_pct ?? 0;
  const todayBadge = document.getElementById('h-today-badge');
  todayBadge.textContent = '오늘 ' + fmtPct(todayPct);
  todayBadge.className = 'badge ' + (todayPct > 0 ? 'up' : todayPct < 0 ? 'dn' : 'neu');

  document.getElementById('h-winrate').textContent = (p.win_rate ?? 0).toFixed(1) + '%';
  document.getElementById('h-wins-badge').textContent = (p.wins ?? 0) + '승 / ' + (p.losses ?? 0) + '패';
  document.getElementById('h-total-trades').textContent = '최근 ' + (p.total_trades ?? 0) + '거래';

  const open = p.open_positions ?? 0, max = p.max_slots ?? 5;
  const hPos = document.getElementById('h-positions');
  hPos.textContent = '';
  hPos.appendChild(document.createTextNode(String(open)));
  const sub = document.createElement('span');
  sub.style.cssText = 'font-size:28px;font-weight:500;color:var(--secondary)';
  sub.textContent = ' / ' + max;
  hPos.appendChild(sub);

  const unreal = p.unrealized_pnl ?? 0;
  const urBadge = document.getElementById('h-unrealized-badge');
  urBadge.textContent = '미실현 ' + fmtMoney(unreal);
  urBadge.className = 'badge ' + (unreal > 0 ? 'up' : unreal < 0 ? 'dn' : 'neu');
  document.getElementById('h-slot-rate').textContent = '슬롯 ' + (max > 0 ? Math.round(open/max*100) : 0) + '%';

  const cap = p.total_capital ?? 0;
  document.getElementById('q-capital').textContent = cap >= 10000 ? Math.round(cap/10000) + '만' : fmtNum(cap);
  document.getElementById('q-capital-sub').textContent = '총 투자 원금';

  const realized = p.realized_pnl ?? 0;
  const qR = document.getElementById('q-realized');
  qR.textContent = fmtMoney(realized);
  qR.className = 'stat-value ' + (realized >= 0 ? 'pos' : 'neg');
  document.getElementById('q-monthly').textContent = '이번 달 ' + fmtMoney(p.monthly_pnl ?? 0);

  const qU = document.getElementById('q-unrealized');
  qU.textContent = fmtMoney(unreal);
  qU.className = 'stat-value ' + (unreal >= 0 ? 'pos' : 'neg');
  document.getElementById('q-unrealized-sub').textContent = open + '종목 합산';

  document.getElementById('q-today-count').textContent = (p.today_trades_count ?? 0) + '건';
  const qTP = document.getElementById('q-today-pnl');
  const todayPnl = p.today_pnl ?? 0;
  qTP.textContent = '순손익 ' + fmtMoney(todayPnl);
  qTP.style.color = todayPnl > 0 ? 'var(--positive)' : todayPnl < 0 ? 'var(--negative)' : 'var(--tertiary)';

  const tbody = document.getElementById('positions-tbody');
  const positions = d.positions ?? [];
  if (positions.length === 0) {
    tbody.textContent = '';
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.setAttribute('colspan','5');
    td.style.cssText = 'text-align:center;color:var(--tertiary);padding:24px 0';
    td.textContent = '보유 포지션 없음';
    tr.appendChild(td); tbody.appendChild(tr);
  } else {
    const rows = positions.map(pos => {
      const pnlPct = pos.current_pnl_pct ?? 0;
      const tag = esc(pos.regime || pos.grade || '진입');
      return '<tr>'
        + '<td><div class="ticker">' + esc(pos.code) + '</div>'
        + '<div class="ticker-sub">' + esc(pos.name) + '</div></td>'
        + '<td>' + fmtNum(pos.entry_price) + '</td>'
        + '<td>' + fmtNum(pos.qty) + '</td>'
        + '<td class="' + pnlCls(pnlPct) + '">' + fmtPct(pnlPct) + '</td>'
        + '<td><span class="tag">' + tag + '</span></td>'
        + '</tr>';
    });
    tbody.innerHTML = rows.join('');
  }

  const equity = d.equity_curve ?? [];
  if (equity.length > 1) initChart(equity);

  const mkt = d.market ?? {};
  const regime = mkt.regime ?? '--';
  document.getElementById('m-regime').textContent = esc(regime);
  document.getElementById('regime-badge').textContent = esc(regime);

  const fg = mkt.fg_index ?? 0;
  const fgEl = document.getElementById('m-fg');
  if (fg) {
    fgEl.textContent = fg + ' · ' + (fg < 30 ? '공포' : fg > 70 ? '탐욕' : '중립');
    fgEl.className = 'mv ' + (fg < 30 ? 'bad' : fg > 70 ? 'warn' : 'good');
  } else { fgEl.textContent = '--'; fgEl.className = 'mv'; }

  const frgn = mkt.frgn_net ?? 0; // frgn_net 단위: 억원 → fmtMoney에 원화(×1억) 변환
  const frgnEl = document.getElementById('m-frgn');
  frgnEl.textContent = frgn ? fmtMoney(frgn * 100000000) : '--';
  frgnEl.className = 'mv ' + (frgn > 0 ? 'good' : frgn < 0 ? 'bad' : '');

  const vix = mkt.vix ?? 0;
  const vixEl = document.getElementById('m-vix');
  vixEl.textContent = vix ? vix.toFixed(1) : '--';
  vixEl.className = 'mv ' + (vix > 0 && vix < 20 ? 'good' : vix >= 20 && vix < 30 ? 'warn' : vix >= 30 ? 'bad' : '');

  const statsTbody = document.getElementById('stats-tbody');
  const stats = d.stock_stats ?? [];
  if (stats.length === 0) {
    statsTbody.textContent = '';
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.setAttribute('colspan','6');
    td.style.cssText = 'text-align:center;color:var(--tertiary);padding:24px 0';
    td.textContent = '거래 데이터 없음';
    tr.appendChild(td); statsTbody.appendChild(tr);
  } else {
    const rows = stats.slice(0,10).map((s,i) => {
      const wr = s.win_rate ?? 0;
      const wrSafe = Math.min(100, Math.max(0, +wr));
      const barColor = wr >= 60 ? 'var(--positive)' : wr >= 40 ? 'var(--warning)' : 'var(--negative)';
      return '<tr>'
        + '<td style="font-size:12px;color:var(--tertiary);font-weight:500">' + (i+1) + '</td>'
        + '<td>'
        +   '<div style="font-weight:600;font-size:13px">' + esc(s.code)
        +     ' <span style="font-weight:400;color:var(--secondary)">' + esc(s.name) + '</span></div>'
        +   '<div class="bar-wrap"><div class="bar-fill" style="width:' + wrSafe + '%;background:' + barColor + '"></div></div>'
        + '</td>'
        + '<td>' + (s.total_trades ?? '--') + '</td>'
        + '<td class="' + pnlCls(wr - 50) + '">' + wrSafe.toFixed(1) + '%</td>'
        + '<td class="' + pnlCls(s.avg_return ?? 0) + '">' + fmtPct(s.avg_return) + '</td>'
        + '<td class="' + pnlCls(s.total_pnl ?? 0) + '">' + fmtMoney(s.total_pnl) + '</td>'
        + '</tr>';
    });
    statsTbody.innerHTML = rows.join('');
  }
}

async function loadData() {
  try {
    const res = await fetch('krx-data.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    render(d);
  } catch (e) {
    console.warn('데이터 로드 실패:', e.message);
    document.getElementById('nav-updated').textContent = '데이터 로드 실패 — 재시도 중';
  }
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
