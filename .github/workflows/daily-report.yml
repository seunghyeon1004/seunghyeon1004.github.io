name: Daily Trading Report

on:
  schedule:
    # 매일 09:00 KST = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and Process Data
        env:
          WALLET: "0x9c81aF1b4097891AE5aA29EC1d7fC64926dd9c30"
        run: |
          set -e
          export TODAY=$(TZ=Asia/Seoul date "+%Y-%m-%d")
          export GENERATED=$(TZ=Asia/Seoul date "+%Y-%m-%d %H:%M KST")

          curl -sf -X POST "https://api.hyperliquid.xyz/info" \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"clearinghouseState\",\"user\":\"$WALLET\"}" > /tmp/perp.json

          curl -sf -X POST "https://api.hyperliquid.xyz/info" \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"spotClearinghouseState\",\"user\":\"$WALLET\"}" > /tmp/spot.json

          curl -sf -X POST "https://api.hyperliquid.xyz/info" \
            -H "Content-Type: application/json" \
            -d '{"type":"allMids"}' > /tmp/mids.json

          python3 -c '
          import json, os, pathlib

          perp = json.load(open("/tmp/perp.json"))
          spot = json.load(open("/tmp/spot.json"))
          mids = json.load(open("/tmp/mids.json"))

          perp_val = float(perp.get("marginSummary", {}).get("accountValue", "0"))
          spot_usdc = float(next((b["total"] for b in spot.get("balances", []) if b["coin"] == "USDC"), "0"))
          acct = round(perp_val + spot_usdc, 4)

          positions = [p for p in perp.get("assetPositions", []) if abs(float(p["position"].get("szi", "0"))) > 0]
          upnl = round(sum(float(p["position"].get("unrealizedPnl", "0")) for p in positions), 4)
          open_pos = len(positions)

          btc = round(float(mids.get("BTC", 0)), 1)
          eth = round(float(mids.get("ETH", 0)), 2)

          today = os.environ.get("TODAY", "unknown")
          generated = os.environ.get("GENERATED", "unknown")

          # pnl-history.json
          hf = pathlib.Path("pnl-history.json")
          data = json.loads(hf.read_text()) if hf.exists() else {"start_date": today, "note": "auto", "history": []}
          history = data.get("history", [])
          entry = {"date": today, "account_value": acct, "unrealized_pnl": upnl, "open_positions": open_pos}
          idx = next((i for i, h in enumerate(history) if h["date"] == today), None)
          if idx is not None:
              history[idx] = entry
          else:
              history.append(entry)
          data["history"] = history
          hf.write_text(json.dumps(data, indent=2, ensure_ascii=False))

          # daily-report.json
          pnl_sign = "+" if upnl >= 0 else ""
          pnl_emoji = "up" if upnl >= 0 else "down"
          report = (
              f"Minari Daily Report - {today}\n"
              f"BTC: ${btc} | ETH: ${eth}\n"
              f"Account: ${acct:.2f} | Positions: {open_pos} | uPnL: {pnl_sign}${upnl:.2f}"
          )
          rd = {
              "date": today, "generated_at": generated,
              "btc_price": btc, "eth_price": eth,
              "account_value": acct, "open_positions": open_pos,
              "unrealized_pnl": upnl, "report": report
          }
          pathlib.Path("daily-report.json").write_text(json.dumps(rd, indent=2, ensure_ascii=False))
          print(f"Updated: {today} acct={acct} upnl={upnl}")
          '

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-report.json pnl-history.json
          git diff --staged --quiet || git commit -m "chore: daily report $(TZ=Asia/Seoul date '+%Y-%m-%d')"
          git push
